name: Build and deploy slides

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: slidev/package-lock.json

      - name: Install
        working-directory: slidev
        run: npm ci

      - name: Build
        working-directory: slidev
        run: npx slidev build --base /openFeatureTalk/ --out dist

      - name: Copy .nojekyll
        run: touch slidev/dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: slidev/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
